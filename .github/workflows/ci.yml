          components: rust-src
      - name: Install unzip (Verus release zip)
        run: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq unzip
      - name: Verus L3-link smoke → RAYNU-V-M3-L3-LINK-OK
        run: ./tools/verus-link-smoke.sh

  # M3.17: true L3 — green verify, no admit(). Hard-fail.
  verus-verify:
    name: verus L3-verify (M3.17)
