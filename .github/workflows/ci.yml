name: ci

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-host:
    name: host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rust-src, rustfmt, clippy
      - name: cargo test (host, no UEFI)
        run: cargo test --no-default-features

  build-uefi:
    name: UEFI release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rust-src
          targets: x86_64-unknown-uefi
      - name: build r640-hypervisor.efi
        run: ./tools/build.sh
      - name: size budget (ADR-003)
        run: ./tools/check-size.sh
      - name: upload efi artifact
        uses: actions/upload-artifact@v4
        with:
          name: r640-hypervisor.efi
          path: target/x86_64-unknown-uefi/release/r640-hypervisor.efi

  # Boot gate: M0 → M3.8 Linux early / proto fallback (KVM nested when available).
  qemu-boot:
    name: QEMU boot gate (M0-M3.8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rust-src
          targets: x86_64-unknown-uefi
      - name: Install QEMU + OVMF
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq qemu-system-x86 ovmf
      - name: QEMU boot-to-serial gate
        run: |
          # Actions runners often have /dev/kvm root-only; open it for the job.
          if [[ -e /dev/kvm ]]; then
            sudo chmod a+rw /dev/kvm || true
            echo 1 | sudo tee /sys/module/kvm_intel/parameters/nested 2>/dev/null || true
            echo 1 | sudo tee /sys/module/kvm_amd/parameters/nested 2>/dev/null || true
          fi
          ls -l /dev/kvm 2>&1 || true
          echo -n "host cpu flags vmx/svm: "
          grep -E -o '\b(vmx|svm)\b' /proc/cpuinfo | sort -u | tr '\n' ' ' || true
          echo
          # Nested VT-x requires host CPUID.VMX; many cloud VMs expose KVM without it.
          if [[ -r /dev/kvm && -w /dev/kvm ]] && grep -qw vmx /proc/cpuinfo; then
            echo "KVM + host VMX — requiring VMXON through M3.8 early path"
            REQUIRE_VMX=1 QEMU_ACCEL=kvm ./tools/qemu-boot-test.sh
          elif [[ -r /dev/kvm && -w /dev/kvm ]]; then
            echo "KVM without host VMX — boot gate allows VMXON-SKIP"
            REQUIRE_VMX=0 QEMU_ACCEL=kvm ./tools/qemu-boot-test.sh
          else
            echo "KVM not usable — TCG boot gate allows VMXON-SKIP"
            REQUIRE_VMX=0 QEMU_ACCEL=tcg ./tools/qemu-boot-test.sh
          fi
      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m0-serial-log
          path: |
            target/m0-serial.log
            target/m0-qemu-stdout.log
            target/m0-qemu-stderr.log
          if-no-files-found: ignore

  # M3.15: frozen Verus pin smoke (ADR-008). Hard-pass install + cargo verus.
  # Installs ONLY the exact tag/commit/sha256 in verus-version.toml — never "latest".
  # True L3 proof discharge remains M3.17 (crate does not opt into verify yet).
  verus-smoke:
    name: verus pin smoke (M3.15)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Host crate build uses the repo rust-toolchain.toml pin (not floating nightly).
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
          components: rust-src
      - name: Install unzip (Verus release zip)
        run: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq unzip
      - name: Assert frozen Verus pin (exact tag + commit + sha256)
        run: |
          set -euo pipefail
          pin=verus-version.toml
          test -f "$pin"
          grep -E '^version = "0\.[0-9]{4}\.' "$pin"
          grep -E '^tag = "release/' "$pin"
          grep -E '^commit = "[0-9a-f]{40}"' "$pin"
          grep -E '^sha256_linux = "[0-9a-f]{64}"' "$pin"
          grep -E '^toolchain = "' "$pin"
          if grep -E '^(tag|asset_linux|version) = ".*latest' "$pin"; then
            echo "error: pin must not reference latest" >&2
            exit 1
          fi
          if grep -E '^tag = ".*rolling' "$pin"; then
            echo "error: pin must not use rolling pre-release" >&2
            exit 1
          fi
          echo "Frozen pin OK:"
          grep -E '^(version|tag|commit|toolchain|asset_linux|sha256_linux) = ' "$pin"
      - name: Verus pin smoke → RAYNU-V-M3-VERUS-OK
        run: ./tools/verus-smoke.sh

  # M3.16: Verus-linkable EptMap (`ept_model`). Hard-pass under frozen pin.
  verus-link:
    name: verus L3-link (M3.16)
